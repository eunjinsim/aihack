<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitBridge — 전포 가이드 서비스</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --clay: #C1653A;
    --clay-dark: #A54F2B;
    --olive: #6B6B4D;
    --olive-dark: #4A4A34;
    --card: #FFFFFF;
    --danger: #B84A3E;
    --warn: #C08A2E;
    --ok: #4F7A56;
  }
  * { font-family: 'Noto Sans KR', sans-serif; }
  h1, h2, h3, .font-display { font-family: 'Playfair Display', 'Noto Sans KR', serif; }
  body { background: var(--cream); color: var(--olive-dark); }
  .card { background: var(--card); border: 1px solid #E8DFD2; border-radius: 1rem; box-shadow: 0 2px 10px rgba(74,74,52,0.08); }
  .btn-clay { background: var(--clay); color: #fff; }
  .btn-clay:active { background: var(--clay-dark); }
  .btn-outline { background: transparent; border: 1.5px solid var(--clay); color: var(--clay); }
  .tab-active { color: var(--clay); }
  .tab-inactive { color: #A8A08F; }
  .map-pin { font-size: 22px; line-height: 1; cursor: pointer; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
  .scan-line { position: absolute; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #7CFF7C, transparent); animation: scan 1.1s linear infinite; }
  @keyframes scan { 0% { top: 4%; } 100% { top: 94%; } }
  .toast { transition: opacity .3s ease, transform .3s ease; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body class="min-h-screen">

<div id="app">

  <!-- ============ ONBOARDING ============ -->
  <section id="onboarding" class="min-h-screen flex items-center justify-center px-5 py-10">
    <div class="max-w-md w-full">
      <h1 class="font-display text-3xl font-bold text-center mb-1" style="color:var(--clay-dark)">FitBridge</h1>
      <p id="ob-subtitle" class="text-center text-sm mb-8" style="color:var(--olive)"></p>

      <div class="card p-5 mb-4">
        <p id="ob-lang-label" class="text-sm font-medium mb-3"></p>
        <div id="lang-picker" class="grid grid-cols-2 gap-2"></div>
      </div>

      <div class="card p-5 mb-4">
        <label id="ob-diet-label" class="text-sm font-medium mb-2 block"></label>
        <select id="diet-select" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white">
          <option value="none" data-i18n="dietNone"></option>
          <option value="vegan" data-i18n="dietVegan"></option>
          <option value="halal" data-i18n="dietHalal"></option>
          <option value="vegetarian" data-i18n="dietVegetarian"></option>
        </select>
      </div>

      <div class="card p-5 mb-6">
        <p id="ob-spice-label" class="text-sm font-medium mb-3"></p>
        <div id="spice-selector" class="grid grid-cols-4 gap-2 mb-3"></div>
        <p id="spice-description" class="text-xs leading-relaxed" style="color:var(--olive)"></p>
      </div>

      <button id="get-started-btn" class="btn-clay w-full py-3 rounded-xl font-medium text-sm"></button>
    </div>
  </section>

  <!-- ============ MAIN APP ============ -->
  <div id="main-app" class="hidden max-w-md mx-auto min-h-screen flex flex-col" style="background:var(--cream)">
    <header class="flex items-center justify-between px-4 py-3 sticky top-0 z-20" style="background:var(--cream);border-bottom:1px solid #E8DFD2">
      <h1 class="font-display text-lg font-bold" style="color:var(--clay-dark)">FitBridge</h1>
      <button id="reset-btn" class="p-2 rounded-full" style="color:var(--olive)" aria-label="reset">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">

      <!-- ---- MAP TAB ---- -->
      <section id="tab-map" class="tab-panel">
        <div class="p-4">
          <div id="map-filters" class="flex gap-2 mb-3"></div>
          <div class="card overflow-hidden mb-4" style="height:280px">
            <div id="map-canvas" class="w-full h-full"></div>
          </div>
          <div id="location-detail" class="hidden card p-4"></div>
        </div>
      </section>

      <!-- ---- MENU TRANSLATION TAB ---- -->
      <section id="tab-menu" class="tab-panel hidden">
        <div class="p-4">
          <div class="relative rounded-2xl overflow-hidden mb-3" style="background:#111;height:260px">
            <div id="menu-photo-empty" class="absolute inset-0 flex flex-col items-center justify-center text-white/70 gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
              </svg>
              <span id="menu-empty-title" class="text-sm"></span>
            </div>
            <img id="menu-photo-preview" class="hidden w-full h-full object-cover" alt="">
            <div id="menu-scan-overlay" class="hidden absolute inset-0">
              <div class="scan-line"></div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2 mb-3">
            <label class="btn-outline text-center py-2.5 rounded-xl text-sm cursor-pointer">
              <span id="menu-take-photo-label"></span>
              <input id="menu-camera-input" type="file" accept="image/*" capture="environment" class="hidden">
            </label>
            <label class="btn-outline text-center py-2.5 rounded-xl text-sm cursor-pointer">
              <span id="menu-choose-gallery-label"></span>
              <input id="menu-gallery-input" type="file" accept="image/*" class="hidden">
            </label>
          </div>

          <button id="menu-translate-btn" class="btn-clay w-full py-3 rounded-xl font-medium text-sm mb-2" disabled></button>
          <p id="menu-error" class="hidden text-xs text-center mb-2" style="color:var(--danger)"></p>

          <div id="menu-results" class="hidden mt-4"></div>
        </div>
      </section>

      <!-- ---- ALLERGY TAB ---- -->
      <section id="tab-allergy" class="tab-panel hidden">
        <div class="p-4">
          <h2 id="allergy-title" class="font-display text-xl font-bold mb-3"></h2>

          <div class="card p-4 mb-3">
            <label id="allergy-diet-label" class="text-sm font-medium mb-2 block"></label>
            <select id="allergy-diet-select" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white">
              <option value="none" data-i18n="dietNone"></option>
              <option value="vegan" data-i18n="dietVegan"></option>
              <option value="halal" data-i18n="dietHalal"></option>
              <option value="vegetarian" data-i18n="dietVegetarian"></option>
            </select>
          </div>

          <div class="card p-4 mb-3">
            <p id="allergy-grid-title" class="text-sm font-medium mb-3"></p>
            <div id="allergen-grid" class="grid grid-cols-3 gap-2 mb-3"></div>
            <label id="allergy-custom-label" class="text-xs font-medium mb-1 block"></label>
            <input id="allergy-custom-input" type="text" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white" />
          </div>

          <div class="card p-4 mb-3">
            <p id="allergy-preview-label" class="text-xs font-medium mb-1" style="color:var(--olive)"></p>
            <p id="allergy-preview-text" class="text-base leading-relaxed font-medium" style="color:var(--clay-dark)"></p>
          </div>

          <button id="allergy-speak-btn" class="btn-clay w-full py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
            </svg>
            <span id="allergy-speak-label"></span>
          </button>
        </div>
      </section>

      <!-- ---- EXCHANGE TAB ---- -->
      <section id="tab-exchange" class="tab-panel hidden">
        <div class="p-4">
          <h2 id="exchange-title" class="font-display text-xl font-bold mb-3"></h2>

          <div id="exchange-loading" class="text-sm text-center py-8" style="color:var(--olive)"></div>

          <div id="exchange-content" class="hidden">
            <div class="card p-4 mb-3">
              <label id="exchange-currency-label" class="text-xs font-medium mb-1 block"></label>
              <select id="exchange-currency-select" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white mb-3"></select>
              <p id="exchange-rate-line" class="text-sm font-medium mb-3" style="color:var(--clay-dark)"></p>

              <label id="exchange-foreign-label" class="text-xs font-medium mb-1 block"></label>
              <input id="exchange-foreign-input" type="number" inputmode="decimal" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white mb-3" value="10">

              <label id="exchange-krw-label" class="text-xs font-medium mb-1 block"></label>
              <input id="exchange-krw-input" type="number" inputmode="decimal" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white">

              <p id="exchange-updated" class="text-xs mt-3" style="color:var(--olive)"></p>
            </div>

            <div class="card p-4">
              <p id="exchange-table-title" class="text-sm font-medium mb-2"></p>
              <table class="w-full text-sm">
                <tbody id="exchange-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

    </main>

    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto grid grid-cols-4 z-30" style="background:#fff;border-top:1px solid #E8DFD2">
      <button data-tab="map" class="nav-btn flex flex-col items-center py-2.5 gap-0.5 tab-active">
        <span class="text-lg">🗺️</span><span id="nav-map-label" class="text-[11px]"></span>
      </button>
      <button data-tab="menu" class="nav-btn flex flex-col items-center py-2.5 gap-0.5 tab-inactive">
        <span class="text-lg">📷</span><span id="nav-menu-label" class="text-[11px]"></span>
      </button>
      <button data-tab="allergy" class="nav-btn flex flex-col items-center py-2.5 gap-0.5 tab-inactive">
        <span class="text-lg">⚠️</span><span id="nav-allergy-label" class="text-[11px]"></span>
      </button>
      <button data-tab="exchange" class="nav-btn flex flex-col items-center py-2.5 gap-0.5 tab-inactive">
        <span class="text-lg">💱</span><span id="nav-exchange-label" class="text-[11px]"></span>
      </button>
    </nav>
  </div>

  <!-- ============ REVIEWS MODAL ============ -->
  <div id="reviews-modal" class="hidden fixed inset-0 z-40 flex items-end justify-center">
    <div id="reviews-backdrop" class="absolute inset-0 bg-black/40"></div>
    <div class="relative max-w-md w-full bg-white rounded-t-2xl p-5 max-h-[80vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-3">
        <h3 id="reviews-title" class="font-display text-lg font-bold"></h3>
        <button id="reviews-close-btn" class="text-2xl leading-none" style="color:var(--olive)">&times;</button>
      </div>
      <div id="reviews-summary" class="flex gap-4 text-sm mb-4"></div>
      <div id="reviews-list" class="space-y-3 mb-4"></div>

      <div class="card p-3">
        <p id="reviews-add-title" class="text-sm font-medium mb-2"></p>
        <input id="review-name-input" type="text" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white mb-2">
        <textarea id="review-comment-input" rows="2" class="w-full border border-[#E8DFD2] rounded-lg px-3 py-2 text-sm bg-white mb-2"></textarea>
        <label id="reviews-spice-felt-label" class="text-xs font-medium mb-1 block"></label>
        <div id="review-spice-picker" class="grid grid-cols-4 gap-1.5 mb-3"></div>
        <button id="review-submit-btn" class="btn-clay w-full py-2.5 rounded-lg text-sm font-medium"></button>
      </div>
    </div>
  </div>

  <!-- ============ RESET CONFIRM MODAL ============ -->
  <div id="reset-confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-6">
    <div class="absolute inset-0 bg-black/40"></div>
    <div class="relative card p-5 max-w-xs w-full text-center">
      <h3 id="reset-confirm-title" class="font-display text-lg font-bold mb-2"></h3>
      <p id="reset-confirm-body" class="text-sm mb-4" style="color:var(--olive)"></p>
      <div class="flex gap-2">
        <button id="reset-cancel-btn" class="btn-outline flex-1 py-2.5 rounded-lg text-sm"></button>
        <button id="reset-confirm-btn" class="btn-clay flex-1 py-2.5 rounded-lg text-sm"></button>
      </div>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast" class="toast hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-full text-sm text-white shadow-lg" style="background:var(--olive-dark)"></div>

</div>

  lang: 'en',

  activeTab: 'map',

};

function saveProfile() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    lang: state.lang, diet: state.diet, spice: state.spice,
    allergens: state.allergens, customAllergens: state.customAllergens
  }));
}

function loadProfile() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

/* ===================== ONBOARDING ===================== */
function renderLangPicker() {
  const wrap = document.getElementById('lang-picker');
  wrap.innerHTML = '';
  LANG_META.forEach(l => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'flex items-center gap-2 px-3 py-2 rounded-lg text-sm border ' + (state.lang === l.code ? 'border-[var(--clay)] bg-[#FBEEE6]' : 'border-[#E8DFD2]');
    btn.style.color = state.lang === l.code ? 'var(--clay-dark)' : 'var(--olive-dark)';
    btn.innerHTML = `<span>${l.flag}</span><span>${l.name}</span>`;
    btn.addEventListener('click', () => { state.lang = l.code; renderLangPicker(); translateUI(); });
    wrap.appendChild(btn);
  });
}

function resizeImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1024;
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = () => reject(new Error('image decode failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelect(e, isDemo) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const errEl = document.getElementById('menu-error');
  errEl.classList.add('hidden');

  let dataUrl;
  try {
    dataUrl = await resizeImageFile(file);
  } catch {
    errEl.textContent = t('menuErrorGeneric');
    errEl.classList.remove('hidden');
    return;
  }

  const approxBytes = dataUrl.length * 0.75;
  if (approxBytes > 3 * 1024 * 1024) {
    errEl.textContent = t('menuErrorTooLarge');
    errEl.classList.remove('hidden');
    e.target.value = '';
    return;
  }

  state.menu.isDemo = false;
  state.menu.demoLocationId = null;
  state.menu.imageDataUrl = dataUrl;
  state.menu.dishes = null;
  state.menu.selectedDishIndex = null;
  state.menu.mode = null;

  document.getElementById('menu-photo-empty').classList.add('hidden');
  const preview = document.getElementById('menu-photo-preview');
  preview.src = dataUrl;
  preview.classList.remove('hidden');
  document.getElementById('menu-translate-btn').disabled = false;
  document.getElementById('menu-results').classList.add('hidden');
}

async function runMenuAnalysis() {

  const userAllergens = new Set([...state.allergens, ...state.customAllergens.map(a => a.ko)]);
  const hasDirect = (dish.allergens || []).some(a => userAllergens.has(a));
  const hasCross = (dish.crossContactAllergens || []).some(a => userAllergens.has(a));
  const dietConflict = (state.diet === 'vegan' || state.diet === 'vegetarian') && (dish.allergens || []).some(a => ['pork','beef','chicken','shrimp','crab','squid','mackerel','shellfish'].includes(a));

  let level = 'ok', text = t('menuSafetyOk');
  if (hasDirect || dietConflict) { level = 'danger'; text = t('menuSafetyDanger'); }
  else if (hasCross) { level = 'warning'; text = t('menuSafetyWarning'); }

  const colors = { ok:'var(--ok)', warning:'var(--warn)', danger:'var(--danger)' };
  const icons = { ok:'✅', warning:'⚠️', danger:'🚫' };
  return `<div class="rounded-xl px-3 py-2 text-xs font-medium mb-3" style="background:${colors[level]}22;color:${colors[level]}">${icons[level]} ${text}</div>`;
}

function dietKoreanClause() {
  const clauses = {
    none: '',
    vegan: '저는 비건이라 고기, 생선, 유제품, 달걀을 먹지 않습니다.',
    vegetarian: '저는 채식주의자라 고기와 생선을 먹지 않습니다.',
    halal: '저는 할랄 음식만 먹습니다. 돼지고기와 술은 먹을 수 없습니다.'
  };
  return clauses[state.diet] || '';
}

function allergyKoreanClause() {
  const names = [
    ...state.allergens.map(id => ALLERGEN_NAMES[id].ko),
    ...state.customAllergens.map(a => a.ko)
  ];
  if (!names.length) return '';
  return `저는 ${names.join(', ')} 알레르기가 있습니다. 이 재료들을 절대 넣지 말아주세요.`;
}

function speakKorean(text) {
  if (!('speechSynthesis' in window)) { showToast(text); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  window.speechSynthesis.speak(utter);
}

function wireAskWaiterSection(dishes, selectedIdx) {
  document.querySelectorAll('.q-toggle').forEach(btn => {
    const active = btn.getAttribute('data-q') === menuQuestionType;
    btn.style.borderColor = active ? 'var(--clay)' : '#E8DFD2';
    btn.style.background = active ? '#FBEEE6' : 'transparent';
    btn.style.color = active ? 'var(--clay-dark)' : 'var(--olive-dark)';
    btn.addEventListener('click', () => { menuQuestionType = btn.getAttribute('data-q'); wireAskWaiterSection(dishes, selectedIdx); });
  });

  const askBtn = document.getElementById('ask-waiter-btn');
  askBtn.addEventListener('click', () => {
    if (selectedIdx === null || selectedIdx === undefined || !dishes[selectedIdx]) { showToast(t('menuNoDishSelected')); return; }
    const dish = dishes[selectedIdx];
    let sentence = '';
    if (menuQuestionType === 'allergy') {
      const parts = [dietKoreanClause(), allergyKoreanClause()].filter(Boolean);
      sentence = (parts.length ? parts.join(' ') : '저는 알레르기가 있습니다.') + ` '${dish.name_ko}'에 해당 재료가 들어가나요?`;
    } else if (menuQuestionType === 'taste') {
      sentence = `안녕하세요, '${dish.name_ko}' 맛이 어떤가요?`;
    } else {
      sentence = `안녕하세요, '${dish.name_ko}'이(가) 여기서 인기 있는 메뉴인가요?`;
    }
    speakKorean(sentence);
  });

  document.getElementById('ask-popular-dish-btn').addEventListener('click', () => {
    speakKorean('안녕하세요, 여기서 가장 인기 있는 메뉴가 무엇인가요?');
  });
}

/* ===================== ALLERGY INFO TAB ===================== */
document.getElementById('allergy-diet-select').addEventListener('change', (e) => {
  state.diet = e.target.value;
  document.getElementById('diet-select').value = e.target.value;
  saveProfile();
  updateAllergyPreview();
});

function renderAllergenGrid() {
  const wrap = document.getElementById('allergen-grid');
  wrap.innerHTML = '';
  ALLERGEN_IDS.forEach(id => {
    const active = state.allergens.includes(id);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'py-2 px-1 rounded-lg text-[11px] border text-center ' + (active ? 'border-[var(--clay)] bg-[#FBEEE6]' : 'border-[#E8DFD2]');
    btn.style.color = active ? 'var(--clay-dark)' : 'var(--olive-dark)';
    btn.textContent = allergenName(id);
    btn.addEventListener('click', () => {
      if (state.allergens.includes(id)) state.allergens = state.allergens.filter(a => a !== id);
      else state.allergens.push(id);
      saveProfile();
      renderAllergenGrid();
      updateAllergyPreview();
    });
    wrap.appendChild(btn);
  });
}

let customAllergenTimer = null;
document.getElementById('allergy-custom-input').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  e.target.value = '';
  e.target.disabled = true;
  fetch('/api/translate-text', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: val })
  }).then(r => r.json()).then(data => {
    state.customAllergens.push({ original: val, ko: data.translated || val });
    saveProfile();
    updateAllergyPreview();
  }).catch(() => {
    state.customAllergens.push({ original: val, ko: val });
    saveProfile();
    updateAllergyPreview();
  }).finally(() => { e.target.disabled = false; });
});

function updateAllergyPreview() {
  const parts = [dietKoreanClause(), allergyKoreanClause()].filter(Boolean);
  const el = document.getElementById('allergy-preview-text');
  el.textContent = parts.length ? parts.join(' ') : t('allergyNothingSelected');
}

document.getElementById('allergy-speak-btn').addEventListener('click', () => {
  const parts = [dietKoreanClause(), allergyKoreanClause()].filter(Boolean);
  if (!parts.length) { showToast(t('allergyNothingSelected')); return; }
  speakKorean(parts.join(' '));
});

/* ===================== EXCHANGE RATE TAB ===================== */
const CURRENCIES = [
  { code:'USD', flag:'🇺🇸', unit:1 },
  { code:'JPY', flag:'🇯🇵', unit:100 },
  { code:'CNY', flag:'🇨🇳', unit:1 },
  { code:'EUR', flag:'🇪🇺', unit:1 },
  { code:'VND', flag:'🇻🇳', unit:1000 }
];
let exchangeData = null; // { krwPerUnit: {USD:.., JPY:.., ...}, updated: Date }
let selectedCurrency = 'USD';

async function loadExchangeRates() {
  document.getElementById('exchange-loading').classList.remove('hidden');
  document.getElementById('exchange-content').classList.add('hidden');
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/KRW');
    const data = await res.json();
    if (data.result !== 'success') throw new Error('bad response');
    const krwPerUnit = {};
    CURRENCIES.forEach(c => { krwPerUnit[c.code] = 1 / data.rates[c.code]; });
    exchangeData = { krwPerUnit, updated: new Date(data.time_last_update_utc) };
    renderExchangeContent();
  } catch {
    document.getElementById('exchange-loading').textContent = t('exchangeError');
  }
}

function populateCurrencySelect() {
  const sel = document.getElementById('exchange-currency-select');
  sel.innerHTML = CURRENCIES.map(c => `<option value="${c.code}">${c.flag} ${c.code}</option>`).join('');
  sel.value = selectedCurrency;
}

document.getElementById('exchange-currency-select').addEventListener('change', (e) => {
  selectedCurrency = e.target.value;
  renderExchangeContent();
});

function currentRatePerUnit() {
  const cur = CURRENCIES.find(c => c.code === selectedCurrency);
  return exchangeData.krwPerUnit[selectedCurrency] * cur.unit;
}

document.getElementById('exchange-foreign-input').addEventListener('input', (e) => {
  if (!exchangeData) return;
  const amount = parseFloat(e.target.value) || 0;
  const krwVal = amount * exchangeData.krwPerUnit[selectedCurrency];
  document.getElementById('exchange-krw-input').value = Math.round(krwVal);
});

document.getElementById('exchange-krw-input').addEventListener('input', (e) => {
  if (!exchangeData) return;
  const krw = parseFloat(e.target.value) || 0;
  const amount = krw / exchangeData.krwPerUnit[selectedCurrency];
  document.getElementById('exchange-foreign-input').value = Math.round(amount * 100) / 100;
});

function renderExchangeContent() {
  populateCurrencySelect();
  document.getElementById('exchange-loading').classList.add('hidden');
  document.getElementById('exchange-content').classList.remove('hidden');

  const cur = CURRENCIES.find(c => c.code === selectedCurrency);
  const rate = currentRatePerUnit();
  document.getElementById('exchange-rate-line').textContent = `${cur.unit} ${cur.code} = ${Math.round(rate).toLocaleString()} KRW`;

  const foreignInput = document.getElementById('exchange-foreign-input');
  const amount = parseFloat(foreignInput.value) || 10;
  document.getElementById('exchange-krw-input').value = Math.round(amount * exchangeData.krwPerUnit[selectedCurrency]);

  const localeMap = { en:'en-US', ja:'ja-JP', zh:'zh-CN', vi:'vi-VN', es:'es-ES', ko:'ko-KR' };
  const formatted = new Intl.DateTimeFormat(localeMap[state.lang] || 'en-US', { dateStyle:'medium', timeStyle:'short' }).format(exchangeData.updated);
  document.getElementById('exchange-updated').textContent = `${t('exchangeUpdated')}: ${formatted}`;

  const tbody = document.getElementById('exchange-table-body');
  tbody.innerHTML = CURRENCIES.map(c => {
    const r = exchangeData.krwPerUnit[c.code] * c.unit;
    return `<tr class="border-t border-[#E8DFD2]"><td class="py-1.5">${c.flag} ${c.unit} ${c.code}</td><td class="py-1.5 text-right font-medium">${Math.round(r).toLocaleString()} KRW</td></tr>`;
  }).join('');
}

/* ===================== INIT ===================== */
function initMainApp() {
  renderMapFilters();
  loadGoogleMaps();
  renderAllergenGrid();
  document.getElementById('allergy-diet-select').value = state.diet;
  updateAllergyPreview();
  switchTab('map');
}

function boot() {
  renderLangPicker();
  renderSpiceSelector();
  translateUI();

  const saved = loadProfile();
  if (saved) {
    state.lang = saved.lang || 'en';
    state.diet = saved.diet || 'none';
    state.spice = saved.spice ?? 1;
    state.allergens = saved.allergens || [];
    state.customAllergens = saved.customAllergens || [];
    renderLangPicker();
    document.getElementById('diet-select').value = state.diet;
    renderSpiceSelector();
    translateUI();

    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    initMainApp();
    showToast(t('welcomeBack'));
  }
}

boot();
</script>
